<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3x3 ビンゴカード</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: #111 url('images/background.webp') center/cover no-repeat fixed;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      padding-top: 10px;
    }

    .bingo-container {
      text-align: center;
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      padding: 0 10px;
    }

    .logo {
      max-width: 85%;
      height: auto;
      margin-bottom: 8px;
      filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
      cursor: pointer;
    }

    .bingo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      width: 100%;
      margin: 0 auto;
    }

    .cell {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      cursor: pointer;
    }

    .frame {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: url('images/BINGOBOX.webp') center/contain no-repeat;
      z-index: 2;
      pointer-events: none;
    }

    .content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 94%;
      height: 94%;
      object-fit: cover;
      border-radius: 12px;
      z-index: 1;
      transition: transform 0.2s;
      loading: lazy;
      decoding: async;
    }

    .cell:active .content {
      transform: translate(-50%, -50%) scale(0.88);
    }

    .reset-btn {
      margin-top: 25px;
      padding: 14px 32px;
      font-size: 17px;
      background: rgba(230, 57, 57, 0.95);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <div class="bingo-container">
    <img src="images/BINGOlogo.webp" alt="BINGO" class="logo" id="logoBtn">

    <div class="bingo-grid" id="grid"></div>
    
    <button class="reset-btn" onclick="resetAll()">すべてリセット</button>
  </div>

  <audio id="tapSound" src="ka-n_2.mp3"></audio>
  <audio id="bgm" loop>
    <source src="audiostock_122582.mp3" type="audio/mpeg">
  </audio>

  <script>
    const bingoData = [
      { normal: "images/daru_1.webp", alt: "images/daru_2.webp" },
      { normal: "images/koyuki_1.webp", alt: "images/koyuki_2.webp" },
      { normal: "images/opeko_1.webp", alt: "images/opeko_2.webp" },
      { normal: "images/kuon_1.webp", alt: "images/kuon_2.webp" },
      { normal: "images/BINGOFREE.webp", alt: null },
      { normal: "images/satori_1.webp", alt: "images/satori_2.webp" },
      { normal: "images/masamune_1.webp", alt: "images/masamune_2.webp" },
      { normal: "images/guilty_1.webp", alt: "images/guilty_2.webp" },
      { normal: "images/sanzu_1.webp", alt: "images/sanzu_2.webp" }
    ];

    const grid = document.getElementById('grid');
    const tapSound = document.getElementById('tapSound');
    const bgm = document.getElementById('bgm');
    const logoBtn = document.getElementById('logoBtn');

    let isPlaying = false;
    const STORAGE_KEY = "bingoCardState";

    function saveState(states) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(states));
    }

    function loadState() {
      const saved = localStorage.getItem(STORAGE_KEY);
      return saved ? JSON.parse(saved) : null;
    }

    function saveCurrentState() {
      const states = {};
      document.querySelectorAll('.content').forEach(img => {
        const idx = parseInt(img.dataset.index);
        if (!isNaN(idx)) states[idx] = img.dataset.state === 'alt';
      });
      saveState(states);
    }

    function createCard() {
      grid.innerHTML = '';
      const savedStates = loadState();

      bingoData.forEach((data, index) => {
        const cell = document.createElement('div');
        cell.className = 'cell';

        const img = document.createElement('img');
        img.className = 'content';
        img.loading = "lazy";
        img.decoding = "async";
        img.alt = "ビンゴマス " + (index + 1);
        img.dataset.state = 'normal';
        img.dataset.index = index;

        if (savedStates && savedStates[index]) {
          img.src = data.alt;
          img.dataset.state = 'alt';
        } else {
          img.src = data.normal;
        }

        img.onerror = function() {
          console.log("読み込み失敗:", this.src);
          if (this.src.endsWith('.webp')) this.src = this.src.replace('.webp', '.png');
        };

        if (index !== 4) {
          const frame = document.createElement('div');
          frame.className = 'frame';
          cell.appendChild(img);
          cell.appendChild(frame);

          cell.addEventListener('click', () => {
            tapSound.currentTime = 0;
            tapSound.play().catch(() => {});

            if (img.dataset.state === 'alt') {
              img.src = data.normal;
              img.dataset.state = 'normal';
            } else {
              img.src = data.alt;
              img.dataset.state = 'alt';
            }

            saveCurrentState();
          });
        } else {
          cell.appendChild(img);
          cell.style.pointerEvents = 'none';
        }

        grid.appendChild(cell);
      });
    }

    function resetAll() {
      tapSound.currentTime = 0;
      tapSound.play().catch(() => {});
      localStorage.removeItem(STORAGE_KEY);
      createCard();
    }

    logoBtn.addEventListener('click', () => {
      if (!isPlaying) {
        bgm.volume = 0.4;
        bgm.play().catch(() => {});
        isPlaying = true;
      } else {
        bgm.pause();
        isPlaying = false;
      }
      logoBtn.style.transform = 'scale(0.92)';
      setTimeout(() => logoBtn.style.transform = 'scale(1)', 120);
    });

    window.onload = createCard;
  </script>
</body>
</html>
