<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>5x5 ビンゴカード</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: #111 url('images/background.webp') center/cover no-repeat fixed;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      padding-top: 10px;
    }

    .bingo-container {
      text-align: center;
      width: 100%;
      max-width: 1000px; /* 5x5用に拡大 */
      margin: 0 auto;
      padding: 0 15px;
    }

    .logo {
      max-width: 75%;
      height: auto;
      margin-bottom: 12px;
      filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
      cursor: pointer;
    }

    .bingo-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr); /* 5x5に変更 */
      gap: 6px;
      width: 100%;
      margin: 0 auto;
    }

    .cell {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      cursor: pointer;
    }

    .frame {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: url('images/BINGOBOX.webp') center/contain no-repeat;
      z-index: 2;
      pointer-events: none;
    }

    .content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 12px;
      z-index: 3;
      transition: transform 0.2s;
      loading: lazy;
      decoding: async;
    }

    .cell:active .content {
      transform: translate(-50%, -50%) scale(0.88);
    }

    .reset-btn {
      margin-top: 30px;
      padding: 14px 40px;
      font-size: 18px;
      background: rgba(230, 57, 57, 0.95);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <div class="bingo-container">
    <img src="images/BINGOlogo.webp" alt="BINGO" class="logo" id="logoBtn">

    <div class="bingo-grid" id="grid"></div>
    
    <button class="reset-btn" onclick="resetAll()">すべてリセット</button>
  </div>

  <audio id="tapSound" src="ka-n_2.mp3"></audio>
  <audio id="bgm" loop>
    <source src="audiostock_122582.mp3" type="audio/mpeg">
  </audio>

  <script>
    // 5x5用にデータを拡張（既存の画像を繰り返し使用）
    const bingoData = [
      //1
      { normal: "images/koyuki_1.webp", alt: "images/koyuki_2.webp" },
      { normal: "images/koba_1.webp", alt: "images/koba_2.webp" },
      { normal: "images/michael_1.webp", alt: "images/michael_2.webp" },
      { normal: "images/nightmare_1.webp", alt: "images/nightmare_2.webp" },
      { normal: "images/lucifer_1.webp", alt: "images/lucifer_2.webp" },
      //2
      { normal: "images/Nostradamus_1.webp", alt: "images/Nostradamus_2.webp" },
      { normal: "images/uriel_1.webp", alt: "images/uriel_2.webp" },
      { normal: "images/el_1.webp", alt: "images/el_2.webp" },
      { normal: "images/Yggdrasil_1.webp", alt: "images/Yggdrasil_2.webp" },
      { normal: "images/pirka_1.webp", alt: "images/pirka_2.webp" },
      //3
      { normal: "images/neo_1.webp", alt: "images/neo_2.webp" },
      { normal: "images/pandora_1.webp", alt: "images/pandora_2.webp" },
      { normal: "images/BINGOFREE.webp", alt: null }, // 中央FREE
      { normal: "images/gungnir_1.webp", alt: "images/gungnir_2.webp" },
      { normal: "images/metatron_1.webp", alt: "images/metatron_2.webp" },
      //4
      { normal: "images/benza_1.webp", alt: "images/benza_2.webp" },
      { normal: "images/snow_1.webp", alt: "images/snow_2.webp" },
      { normal: "images/apple_1.webp", alt: "images/apple_2.webp" },
      { normal: "images/sandal_1.webp", alt: "images/sandal_2.webp" },
      { normal: "images/kityo_1.webp", alt: "images/kityo_2.webp" },
      //5
      { normal: "images/raphael_1.webp", alt: "images/raphael_2.webp" },
      { normal: "images/satan_1.webp", alt: "images/satan_2.webp" },
      { normal: "images/alice_1.webp", alt: "images/alice_2.webp" },
      { normal: "images/gabriel_1.webp", alt: "images/gabriel_2.webp" },
      { normal: "images/nemu_1.webp", alt: "images/nemu_2.webp" },
    ];

    const grid = document.getElementById('grid');
    const tapSound = document.getElementById('tapSound');
    const bgm = document.getElementById('bgm');
    const logoBtn = document.getElementById('logoBtn');

    let isPlaying = false;
    const STORAGE_KEY = "bingoCardState5x5";

    function saveState(states) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(states));
    }

    function loadState() {
      const saved = localStorage.getItem(STORAGE_KEY);
      return saved ? JSON.parse(saved) : null;
    }

    function saveCurrentState() {
      const states = {};
      document.querySelectorAll('.content').forEach(img => {
        const idx = parseInt(img.dataset.index);
        if (!isNaN(idx)) states[idx] = img.dataset.state === 'alt';
      });
      saveState(states);
    }

    function createCard() {
      grid.innerHTML = '';
      const savedStates = loadState();

      bingoData.forEach((data, index) => {
        const cell = document.createElement('div');
        cell.className = 'cell';

        const img = document.createElement('img');
        img.className = 'content';
        img.loading = "lazy";
        img.decoding = "async";
        img.alt = "ビンゴマス " + (index + 1);
        img.dataset.state = 'normal';
        img.dataset.index = index;

        // 中央（index 12）をFREEにする
        if (index === 12) {
          img.src = data.normal; // BINGOFREE.webp
          cell.appendChild(img);
          cell.style.pointerEvents = 'none';
        } else {
          if (savedStates && savedStates[index] !== undefined) {
            img.src = savedStates[index] ? data.alt : data.normal;
            img.dataset.state = savedStates[index] ? 'alt' : 'normal';
          } else {
            img.src = data.normal;
          }

          img.onerror = function() {
            console.log("読み込み失敗:", this.src);
            if (this.src.endsWith('.webp')) this.src = this.src.replace('.webp', '.png');
          };

          const frame = document.createElement('div');
          frame.className = 'frame';
          cell.appendChild(img);
          cell.appendChild(frame);

          cell.addEventListener('click', () => {
            tapSound.currentTime = 0;
            tapSound.play().catch(() => {});

            if (img.dataset.state === 'alt') {
              img.src = data.normal;
              img.dataset.state = 'normal';
            } else {
              img.src = data.alt;
              img.dataset.state = 'alt';
            }

            saveCurrentState();
          });
        }

        grid.appendChild(cell);
      });
    }

    function resetAll() {
      tapSound.currentTime = 0;
      tapSound.play().catch(() => {});
      localStorage.removeItem(STORAGE_KEY);
      createCard();
    }

    logoBtn.addEventListener('click', () => {
      if (!isPlaying) {
        bgm.volume = 0.4;
        bgm.play().catch(() => {});
        isPlaying = true;
      } else {
        bgm.pause();
        isPlaying = false;
      }
      logoBtn.style.transform = 'scale(0.92)';
      setTimeout(() => logoBtn.style.transform = 'scale(1)', 120);
    });

    window.onload = createCard;
  </script>
</body>
</html>
