<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3x3 ビンゴカード</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      position: relative;
    }

    .bingo-container {
      text-align: center;
      background: #111 url('background.jpg') contain no-repeat;
      padding: 30px 20px;
      max-width: 100%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);           /* ぼかし効果（対応ブラウザのみ） */
    }

    .logo {
      max-width: 340px;
      height: auto;
      margin-bottom: 20px;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.6));
    }

    .bingo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: 360px;
      margin: 0 auto;
      padding: 10px;
      background: rgba(255,255,255,0.15);
      border-radius: 16px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    }

    .cell {
      aspect-ratio: 1 / 1;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .cell:active {
      transform: scale(0.93);
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .reset-btn {
      margin-top: 25px;
      padding: 14px 32px;
      font-size: 17px;
      background: rgba(230, 57, 57, 0.95);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
      backdrop-filter: blur(4px);
    }

    .reset-btn:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>
  <div class="bingo-container">
    <img src="BINGO.png" alt="BINGO" class="logo">

    <div class="bingo-grid" id="grid"></div>
    
    <button class="reset-btn" onclick="resetAll()">すべてリセット</button>
  </div>

  <!-- 効果音 -->
  <audio id="tapSound" src="ka-n.mp3"></audio>

  <script>
    const bingoData = [
      { normal: "daru_1.png", alt: "daru_2.png" },
      { normal: "https://picsum.photos/id/102/300/300", alt: "https://picsum.photos/id/237/300/300" },
      { normal: "https://picsum.photos/id/133/300/300", alt: "https://picsum.photos/id/180/300/300" },
      { normal: "https://picsum.photos/id/201/300/300", alt: "https://picsum.photos/id/251/300/300" },
      { normal: "https://picsum.photos/id/251/300/300", alt: "https://picsum.photos/id/133/300/300" },
      { normal: "https://picsum.photos/id/180/300/300", alt: "https://picsum.photos/id/1015/300/300" },
      { normal: "https://picsum.photos/id/237/300/300", alt: "https://picsum.photos/id/102/300/300" },
      { normal: "https://picsum.photos/id/133/300/300", alt: "https://picsum.photos/id/201/300/300" },
      { normal: "https://picsum.photos/id/180/300/300", alt: "https://picsum.photos/id/251/300/300" }
    ];

    const grid = document.getElementById('grid');
    const tapSound = document.getElementById('tapSound');

    function createCard() {
      grid.innerHTML = '';
      bingoData.forEach((data) => {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.state = 'normal';

        const img = document.createElement('img');
        img.src = data.normal;
        cell.appendChild(img);

        cell.addEventListener('click', () => {
          tapSound.currentTime = 0;
          tapSound.play().catch(() => {});

          if (cell.dataset.state === 'normal') {
            img.src = data.alt;
            cell.dataset.state = 'alt';
          } else {
            img.src = data.normal;
            cell.dataset.state = 'normal';
          }
        });
        grid.appendChild(cell);
      });
    }

    function resetAll() { 
      tapSound.currentTime = 0;
      createCard(); 
    }

    window.onload = createCard;
  </script>
</body>
</html>
