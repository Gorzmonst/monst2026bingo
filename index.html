<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3x3 ビンゴカード</title>
  <style>
    body {
      margin: 0px;
      padding: 0px;
      min-height: 100vh;
      background: #111 url('background.webp') center/cover no-repeat fixed;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      padding-top: 10px;         /* 必要最小限の上余白 */
    }

    .bingo-container {
      text-align: center;
      width: 100%;
      margin: 0 auto;
      padding: 0 10px;
    }

    .logo {
      max-width: 90%;
      height: auto;
      margin-bottom: 8px;
      filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
    }

    .bingo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
      width: 100%;
      max-width: 900px;        /* 好みで 420〜480px に調整 */
      margin: 0 auto;
    }

    .cell {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;     /* ← これに変更（padding-top方式から） */
      cursor: pointer;
    }

    /* 固定の枠（縁） */
    .frame {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('BINGOBOX.webp') center/contain no-repeat; /* ← ここに枠画像 */
      z-index: 2;
      pointer-events: none;
    }

    /* 中身の画像 */
    .content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;               /* 枠の内側サイズ調整 */
      height: 100%;
      object-fit: cover;
      border-radius: 10px;
      z-index: 3;
      transition: transform 0.2s;
            /* WebP軽量化用 */
      loading: lazy;
      decoding: async;
      will-change: transform;        /* クリック時のアニメーションを軽く */
    }

    .cell:active .content {
      transform: translate(-50%, -50%) scale(0.90);
    }

    .reset-btn {
      margin-top: 10px;
      padding: 14px 32px;
      font-size: 17px;
      background: rgba(230, 57, 57, 0.95);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <div class="bingo-container">
    <!-- タイトルロゴをボタン化 -->
    <img src="BINGOlogo.webp" 
         alt="BINGO" 
         class="logo" 
         id="logoBtn">

    <div class="bingo-grid" id="grid"></div>
    
    <button class="reset-btn" onclick="resetAll()">すべてリセット</button>
  </div>

  <audio id="tapSound" src="ka-n_2.mp3"></audio>
  <audio id="bgm" loop>
    <source src="audiostock_122582.mp3" type="audio/mpeg">
  </audio>

  <script>
    const bingoData = [
      { normal: "daru_1.webp", alt: "daru_2.webp" },
      { normal: "koyuki_1.webp", alt: "koyuki_2.webp" },
      { normal: "opeko_1.webp", alt: "opeko_2.webp" },
      { normal: "kuon_1.webp", alt: "kuon_2.webp" },
      { normal: "BINGOFREE.webp", alt: "BINGOFREE.webp" },
      { normal: "satori_1.webp", alt: "satori_2.webp" },
      { normal: "masamune_1.webp", alt: "masamune_2.webp" },
      { normal: "guilty_1.webp", alt: "guilty_2.webp" },
      { normal: "sanzu_1.webp", alt: "sanzu_2.webp" }
    ];

const grid = document.getElementById('grid');
const tapSound = document.getElementById('tapSound');
const bgm = document.getElementById('bgm');
const logoBtn = document.getElementById('logoBtn');

let isPlaying = false;

// ==================== 状態保存関連 ====================
const STORAGE_KEY = "bingoCardState";

// 状態を保存する関数
function saveState(states) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(states));
}

// 状態を読み込む関数
function loadState() {
  const saved = localStorage.getItem(STORAGE_KEY);
  return saved ? JSON.parse(saved) : null;
}

// ==================== createCard ====================
function createCard() {
  grid.innerHTML = '';
  const savedStates = loadState();   // 保存された状態を取得

  bingoData.forEach((data, index) => {
    const cell = document.createElement('div');
    cell.className = 'cell';

    const img = document.createElement('img');
    img.className = 'content';
    img.loading = "lazy";
    img.decoding = "async";
    img.alt = "ビンゴマス " + (index + 1);
    img.dataset.state = 'normal';
    img.dataset.index = index;        // インデックス保存

    // 保存された状態があれば復元
    if (savedStates && savedStates[index]) {
      img.src = data.alt;
      img.dataset.state = 'alt';
    } else {
      img.src = data.normal;
    }

    // WebPエラー対策
    img.onerror = function() {
      console.log("読み込み失敗:", this.src);
      if (this.src.endsWith('.webp')) this.src = this.src.replace('.webp', '.png');
    };

    // 枠とクリック処理
    if (index !== 4) {
      const frame = document.createElement('div');
      frame.className = 'frame';
      cell.appendChild(img);
      cell.appendChild(frame);

      cell.addEventListener('click', () => {
        tapSound.currentTime = 0;
        tapSound.play().catch(() => {});

        if (img.dataset.state === 'alt') {
          img.src = data.normal;
          img.dataset.state = 'normal';
        } else {
          img.src = data.alt;
          img.dataset.state = 'alt';
        }

        // クリックするたびに全状態を保存
        saveCurrentState();
      });
    } else {
      cell.appendChild(img);
      cell.style.pointerEvents = 'none';
    }

    grid.appendChild(cell);
  });
}

// 現在の全状態を保存
function saveCurrentState() {
  const states = {};
  document.querySelectorAll('.content').forEach(img => {
    const idx = parseInt(img.dataset.index);
    if (!isNaN(idx)) {
      states[idx] = img.dataset.state === 'alt';
    }
  });
  saveState(states);
}

// リセット（保存もクリア）
function resetAll() {
  tapSound.currentTime = 0;
  tapSound.play().catch(() => {});
  localStorage.removeItem(STORAGE_KEY);   // 保存データ削除
  createCard();
}

// BGM部分はそのまま...
logoBtn.addEventListener('click', () => { ... }); // 省略

window.onload = createCard;
  </script>
</body>
</html>
