<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3x3 ビンゴカード</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      background: #111 url('background.jpg') center/cover no-repeat fixed;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }

    .bingo-container {
      text-align: center;
    }

    .logo {
      max-width: 340px;
      height: auto;
      margin-bottom: 25px;
      filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
    }

    .bingo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      width: 390px;
      margin: 0 auto;
    }

    .cell {
      position: relative;
      width: 120px;
      height: 120px;
      cursor: pointer;
    }

    /* 固定の枠（縁） */
    .frame {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('BINGOBOX.png') center/contain no-repeat; /* ← ここに枠画像 */
      z-index: 2;
      pointer-events: none;
    }

    /* 中身の画像 */
    .content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 78%;               /* 枠の内側サイズ調整 */
      height: 78%;
      object-fit: cover;
      border-radius: 8px;
      z-index: 1;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
      transition: transform 0.2s;
    }

    .cell:active .content {
      transform: translate(-50%, -50%) scale(0.92);
    }

    .reset-btn {
      margin-top: 30px;
      padding: 14px 32px;
      font-size: 17px;
      background: rgba(230, 57, 57, 0.95);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <div class="bingo-container">
    <img src="BINGO.png" alt="BINGO" class="logo">

    <div class="bingo-grid" id="grid"></div>
    
    <button class="reset-btn" onclick="resetAll()">すべてリセット</button>
  </div>

  <audio id="tapSound" src="ka-n.mp3"></audio>

  <script>
    const bingoData = [
      { normal: "daru_1.png", alt: "daru_2.png" },
      { normal: "https://picsum.photos/id/102/300/300", alt: "https://picsum.photos/id/237/300/300" },
      { normal: "https://picsum.photos/id/133/300/300", alt: "https://picsum.photos/id/180/300/300" },
      { normal: "https://picsum.photos/id/201/300/300", alt: "https://picsum.photos/id/251/300/300" },
      { normal: "https://picsum.photos/id/251/300/300", alt: "https://picsum.photos/id/133/300/300" },
      { normal: "https://picsum.photos/id/180/300/300", alt: "https://picsum.photos/id/1015/300/300" },
      { normal: "https://picsum.photos/id/237/300/300", alt: "https://picsum.photos/id/102/300/300" },
      { normal: "https://picsum.photos/id/133/300/300", alt: "https://picsum.photos/id/201/300/300" },
      { normal: "https://picsum.photos/id/180/300/300", alt: "https://picsum.photos/id/251/300/300" }
    ];

    const grid = document.getElementById('grid');
    const tapSound = document.getElementById('tapSound');

    function createCard() {
      grid.innerHTML = '';
      
      bingoData.forEach((data) => {
        const cell = document.createElement('div');
        cell.className = 'cell';

        // 固定枠
        const frame = document.createElement('div');
        frame.className = 'frame';

        // 中身画像
        const img = document.createElement('img');
        img.className = 'content';
        img.src = data.normal;

        cell.appendChild(img);
        cell.appendChild(frame);

        // クリック処理
        cell.addEventListener('click', () => {
          tapSound.currentTime = 0;
          tapSound.play().catch(() => {});

          if (img.dataset.state === 'alt') {
            img.src = data.normal;
            img.dataset.state = 'normal';
          } else {
            img.src = data.alt;
            img.dataset.state = 'alt';
          }
        });

        grid.appendChild(cell);
      });
    }

    function resetAll() {
      tapSound.currentTime = 0;
      createCard();
    }

    window.onload = createCard;
  </script>
</body>
</html>
