<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3x3 ビンゴカード</title>
  <style>
    body {
      margin: 0px;
      padding: 0px;
      min-height: 100vh;
      background: #111 url('background.webp') center/cover no-repeat fixed;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }

    .bingo-container {
      text-align: center;
      width: 100%;
      margin: 5px;
    }

    .logo {
      max-width: 90%;
      height: auto;
      margin-bottom: 10px;
      filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
    }

    .bingo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
      width: 100%;
      max-width: 900px;        /* 好みで 420〜480px に調整 */
      margin: 0 auto;
    }

    .cell {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;     /* ← これに変更（padding-top方式から） */
      cursor: pointer;
    }

    /* 固定の枠（縁） */
    .frame {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('BINGOBOX.webp') center/contain no-repeat; /* ← ここに枠画像 */
      z-index: 2;
      pointer-events: none;
    }

    /* 中身の画像 */
    .content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;               /* 枠の内側サイズ調整 */
      height: 100%;
      object-fit: cover;
      border-radius: 10px;
      z-index: 3;
      transition: transform 0.2s;
            /* WebP軽量化用 */
      loading: lazy;
      decoding: async;
      will-change: transform;        /* クリック時のアニメーションを軽く */
    }

    .cell:active .content {
      transform: translate(-50%, -50%) scale(0.90);
    }

    .reset-btn {
      margin-top: 10px;
      padding: 14px 32px;
      font-size: 17px;
      background: rgba(230, 57, 57, 0.95);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <div class="bingo-container">
    <!-- タイトルロゴをボタン化 -->
    <img src="BINGOlogo.webp" 
         alt="BINGO" 
         class="logo" 
         id="logoBtn">

    <div class="bingo-grid" id="grid"></div>
    
    <button class="reset-btn" onclick="resetAll()">すべてリセット</button>
  </div>

  <audio id="tapSound" src="ka-n_2.mp3"></audio>
  <audio id="bgm" loop>
    <source src="audiostock_122582.mp3" type="audio/mpeg">
  </audio>

  <script>
    const bingoData = [
      { normal: "daru_1.webp", alt: "daru_2.webp" },
      { normal: "koyuki_1.webp", alt: "koyuki_2.webp" },
      { normal: "opeko_1.webp", alt: "opeko_2.webp" },
      { normal: "kuon_1.webp", alt: "kuon_2.webp" },
      { normal: "BINGOFREE.webp", alt: "BINGOFREE.webp" },
      { normal: "satori_1.webp", alt: "satori_2.webp" },
      { normal: "masamune_1.webp", alt: "masamune_2.webp" },
      { normal: "guilty_1.webp", alt: "guilty_2.webp" },
      { normal: "sanzu_1.webp", alt: "sanzu_2.webp" }
    ];

    const grid = document.getElementById('grid');
    const tapSound = document.getElementById('tapSound');
    const bgm = document.getElementById('bgm');
    const logoBtn = document.getElementById('logoBtn');

    let isPlaying = false;

    // ロゴタップでBGM 再生 / 停止 を切り替え
    logoBtn.addEventListener('click', () => {
      if (!isPlaying) {
        // 再生開始
        bgm.volume = 0.4;        // 音量調整
        bgm.play().catch(() => {});
        isPlaying = true;
      } else {
        // 停止
        bgm.pause();
        isPlaying = false;
      }

      // 押したときの軽いアニメーション
      logoBtn.style.transform = 'scale(0.92)';
      setTimeout(() => {
        logoBtn.style.transform = 'scale(1)';
      }, 120);
    });

    // マスをタップしたときの効果音（今まで通り）
    // cell.addEventListener('click', () => { ... } の中は変更なし
function createCard() {
  grid.innerHTML = '';
  
  bingoData.forEach((data, index) => {
    const cell = document.createElement('div');
    cell.className = 'cell';

    // 中身画像
    const img = document.createElement('img');
    img.className = 'content';
    img.src = data.normal;
    img.loading = "lazy";
    img.decoding = "async";
    img.alt = "ビンゴマス " + (index + 1);
    img.dataset.state = 'normal';   // ← 追加（重要）

    // WebPが読み込めなかった時のフォールバック
    img.onerror = function() {
      console.log("読み込み失敗:", this.src);
      if (this.src.endsWith('.webp')) {
        this.src = this.src.replace('.webp', '.png');  // png → jpg → 順に試す
      } else if (this.src.endsWith('.png')) {
        this.src = this.src.replace('.png', '.jpg');
      }
    };

    // ==================== 枠の処理 ====================
    if (index !== 4) {
      // 通常マス → 枠付き
      const frame = document.createElement('div');
      frame.className = 'frame';
      cell.appendChild(img);
      cell.appendChild(frame);
    } else {
      // 中央FREEマス → 枠なし
      cell.appendChild(img);
      cell.style.pointerEvents = 'none';
    }
    // ================================================

    // クリック処理（中央以外）
    if (index !== 4) {
      cell.addEventListener('click', () => {
        tapSound.currentTime = 0;
        tapSound.play().catch(() => {});

        if (img.dataset.state === 'alt') {
          img.src = data.normal;
          img.dataset.state = 'normal';
        } else {
          img.src = data.alt;
          img.dataset.state = 'alt';
        }
      });
    }
    
    grid.appendChild(cell);
  });
}

    function resetAll() {
      tapSound.currentTime = 0;
      createCard();
    }

    window.onload = createCard;
  </script>
</body>
</html>
