<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3x3 ビンゴカード</title>
  <style>
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      background: #111 url('background.jpg') center/cover no-repeat fixed;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .bingo-container {
      text-align: center;
      background: rgba(255,255,255,0.95);
      padding: 25px 20px;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
      max-width: 400px;
    }

    .logo {
      max-width: 320px;
      height: auto;
      margin-bottom: 15px;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
    }

    .bingo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      width: 360px;
      margin: 0 auto;
      background: #222;
      padding: 8px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .cell {
      aspect-ratio: 1 / 1;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      transition: transform 0.2s;
    }

    .cell:active {
      transform: scale(0.92);
    }

    .cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .reset-btn {
      margin-top: 25px;
      padding: 12px 30px;
      font-size: 17px;
      background: #e63939;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="bingo-container">
    <img src="BINGO.png" alt="BINGO" class="logo">

    <div class="bingo-grid" id="grid"></div>
    
    <button class="reset-btn" onclick="resetAll()">すべてリセット</button>
  </div>

  <!-- 効果音 -->
  <audio id="tapSound" src="ka-n.mp3"></audio>

  <script>
    const bingoData = [
      { normal: "https://picsum.photos/id/1015/300/300", alt: "https://picsum.photos/id/201/300/300" },
      { normal: "https://picsum.photos/id/102/300/300", alt: "https://picsum.photos/id/237/300/300" },
      { normal: "https://picsum.photos/id/133/300/300", alt: "https://picsum.photos/id/180/300/300" },
      { normal: "https://picsum.photos/id/201/300/300", alt: "https://picsum.photos/id/251/300/300" },
      { normal: "https://picsum.photos/id/251/300/300", alt: "https://picsum.photos/id/133/300/300" },
      { normal: "https://picsum.photos/id/180/300/300", alt: "https://picsum.photos/id/1015/300/300" },
      { normal: "https://picsum.photos/id/237/300/300", alt: "https://picsum.photos/id/102/300/300" },
      { normal: "https://picsum.photos/id/133/300/300", alt: "https://picsum.photos/id/201/300/300" },
      { normal: "https://picsum.photos/id/180/300/300", alt: "https://picsum.photos/id/251/300/300" }
    ];

    const grid = document.getElementById('grid');
    const tapSound = document.getElementById('tapSound');

    function createCard() {
      grid.innerHTML = '';
      bingoData.forEach((data) => {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.state = 'normal';

        const img = document.createElement('img');
        img.src = data.normal;
        cell.appendChild(img);

        cell.addEventListener('click', () => {
          // 効果音
          tapSound.currentTime = 0;
          tapSound.play().catch(() => {});

          // 画像切り替え
          if (cell.dataset.state === 'normal') {
            img.src = data.alt;
            cell.dataset.state = 'alt';
          } else {
            img.src = data.normal;
            cell.dataset.state = 'normal';
          }
        });
        grid.appendChild(cell);
      });
    }

    function resetAll() { 
      tapSound.currentTime = 0;
      createCard(); 
    }

    window.onload = createCard;
  </script>
</body>
</html>
